server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: agent-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agent_platform}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
